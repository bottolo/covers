name: covers

services:
  frontend:
    container_name: covers-frontend
    image: covers-frontend:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend-node_modules:/app/node_modules
    command: sh -lc "bun install && bun run dev --host 0.0.0.0 --port 5173"

volumes:
  frontend-node_modules:
